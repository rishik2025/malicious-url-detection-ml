<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Created By Thunder Fist</title>
  <style>
    :root{
      --bg1:#070a12;
      --bg2:#0b1030;
      --card:#0f1633cc;
      --text:#eaf0ff;
      --muted:#b9c6ff;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 20%, #6d28d9 0%, transparent 55%),
        radial-gradient(1000px 600px at 80% 30%, #06b6d4 0%, transparent 55%),
        radial-gradient(1000px 700px at 40% 90%, #f97316 0%, transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    /* floating glow blobs */
    .blob{
      position:absolute;
      width:420px;
      height:420px;
      border-radius:50%;
      filter: blur(40px);
      opacity:.35;
      animation: float 10s ease-in-out infinite;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    .b1{background:#22c55e; top:-120px; left:-120px;}
    .b2{background:#a855f7; bottom:-140px; right:-140px; animation-delay: -2s;}
    .b3{background:#38bdf8; top:15%; right:-160px; animation-delay: -4s;}
    @keyframes float{
      0%,100%{transform: translate(0,0) scale(1);}
      50%{transform: translate(20px,-15px) scale(1.05);}
    }

    .wrap{
      width:min(900px, 92vw);
      padding:28px;
    }

    .card{
      position:relative;
      padding:34px 28px;
      border-radius:22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }

    /* animated rainbow border */
    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:24px;
      background: conic-gradient(
        from 180deg,
        #22c55e,
        #38bdf8,
        #a855f7,
        #f97316,
        #f43f5e,
        #22c55e
      );
      filter: blur(0px);
      z-index:-2;
      animation: spin 6s linear infinite;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:2px;
      border-radius:20px;
      background: rgba(9, 12, 28, .78);
      z-index:-1;
    }
    @keyframes spin{to{transform: rotate(360deg)}}

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      color:var(--muted);
      font-weight:600;
      letter-spacing:.3px;
      font-size:14px;
      margin-bottom:16px;
    }

    .dot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(135deg, #22c55e, #38bdf8, #a855f7, #f97316);
      box-shadow: 0 0 18px rgba(56,189,248,.65);
    }

    h1{
      margin:0;
      line-height:1.05;
      font-size: clamp(28px, 4.2vw, 52px);
      letter-spacing: .5px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22c55e, #38bdf8, #a855f7, #f97316);
      -webkit-background-clip: text;
      background-clip:text;
      color: transparent;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.35));
    }

    .sub{
      margin:14px 0 0;
      color: rgba(234,240,255,.85);
      font-size: clamp(14px, 1.6vw, 18px);
      line-height:1.6;
    }

    .name{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      font-weight:800;
      letter-spacing:.6px;
    }
    .chip{
      padding:10px 12px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
    }

    .footer{
      margin-top:18px;
      font-size:12px;
      color: rgba(234,240,255,.6);
    }

    /* subtle sparkle lines */
    .spark{
      position:absolute;
      inset:0;
      background:
        radial-gradient(600px 180px at 20% 10%, rgba(56,189,248,.22), transparent 60%),
        radial-gradient(500px 160px at 90% 30%, rgba(168,85,247,.18), transparent 60%),
        radial-gradient(500px 180px at 40% 90%, rgba(249,115,22,.14), transparent 60%);
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="wrap">
    <div class="card">
      <div class="spark"></div>

      <div class="badge">
        <span class="dot"></span>
        Signature Banner
      </div>

      <h1>THIS TOOL</h1>
      <p class="sub">
        created by
      </p>

      <div class="name">
        <span class="chip">F6</span>
        <span style="opacity:.7;">—</span>
        <span class="chip">Rishikanna k,Shanjay S S,Ramesh Babu Harish.</span>
      </div>

      <div class="footer">© <span id="y"></span> • Made with style</div>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
